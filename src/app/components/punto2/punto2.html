
<div class="container mt-4 bg-dark p-4 rounded shadow-sm">

    <div class="d-flex justify-content-end mb-4">
        <button type="button" class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal"
            data-bs-target="#carritoModal">
            <i class="bi bi-cart fs-5"></i>
            Ver Carrito
            <span class="badge bg-light text-dark rounded-pill">{{ carrito.length }}</span>
        </button>
    </div>

    <div class="row">
        <div class="col-12 col-md-4 col-lg-3 mb-4" *ngFor="let prod of productos">
            <div class="card h-100 shadow-sm border-0">

                <img [src]="prod.img" class="card-img-top" alt="{{ prod.nombre }}">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-primary">{{ prod.nombre }}</h5>
                    <p class="card-text text-muted">{{ prod.descripcion }}</p>
                    <h6 class="text-success mt-auto mb-3 fw-bold">Precio: ${{ prod.precio }}</h6>

                    <button class="btn btn-outline-dark w-75 d-flex align-items-center align-self-center justify-content-center gap-2"
                        (click)="agregarAlCarrito(prod)">
                        <i class="bi bi-cart-plus fs-5"></i>
                        Agregar
                    </button>
                </div>
                
            </div>
        </div>
    </div>

    <div class="modal fade" id="carritoModal" tabindex="-1" aria-labelledby="carritoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title d-flex align-items-center gap-2" id="carritoModalLabel">
                        <i class="bi bi-cart-check fs-4"></i> Tu Carrito
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body p-0">
                    <div *ngIf="carrito.length === 0" class="p-4 text-center text-muted">
                        <i class="bi bi-cart-x fs-1 d-block mb-2"></i>
                        El carrito está vacío.
                    </div>

                    <ul class="list-group list-group-flush" *ngIf="carrito.length > 0">
                        <li class="list-group-item d-flex align-items-center p-3" *ngFor="let item of carrito">

                            <img [src]="item.img" alt="{{ item.nombre }}" class="rounded me-3"
                                style="width: 60px; height: 60px; object-fit: cover;">

                            <div class="flex-grow-1">
                                <h6 class="my-0 text-dark">{{ item.nombre }}</h6>
                                <small class="text-muted">${{ item.precio }} c/u</small>
                            </div>

                            <div class="d-flex align-items-center me-3 border rounded">
                                <button class="btn btn-sm btn-light border-0" (click)="disminuirCantidad(item)">
                                    <i class="bi bi-dash"></i>
                                </button>
                                <span class="px-2 fw-bold">{{ item.cantidad }}</span>
                                <button class="btn btn-sm btn-light border-0" (click)="aumentarCantidad(item)">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>

                            <span class="text-success fw-bold min-w-50 text-end">
                                ${{ item.precio * item.cantidad }}
                            </span>
                        </li>
                    </ul>
                </div>

                <div class="modal-footer bg-light" *ngIf="carrito.length > 0">
                    <div class="w-100 d-flex justify-content-between align-items-center">
                        <span class="fs-5 text-muted">Total a Pagar:</span>
                        <strong class="fs-4 text-dark">${{ totalAbonar }}</strong>
                    </div>
                    <button type="button" class="btn btn-success w-100 mt-2 rounded-pill">Checkout</button>
                </div>

            </div>
        </div>
    </div>
</div>
