<div class="container mt-4">
    <div class="card bg-dark text-white mb-5">
        <div class="card-header text-center">
            <h3>Formulario de Inscripción</h3>
        </div>
        <div class="card-body">
            <form class="row g-3 needs-validation" novalidate #formulario="ngForm" (ngSubmit)="registrar(formulario)"
                [class.was-validated]="formularioEnviado">
                <div class="col-md-6">
                    <label class="form-label">
                        DNI
                    </label>
                    <input type="text" class="form-control" name="dni" [(ngModel)]="inscripcion.dni" required>
                    <div class="invalid-feedback">
                        Ingrese el DNI.
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        Curso
                    </label>
                    <input type="text" class="form-control" name="curso" [(ngModel)]="inscripcion.curso" required>
                    <div class="invalid-feedback">
                        Ingrese el curso.
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        Precio
                    </label>
                    <input type="number" class="form-control" name="precio" [(ngModel)]="inscripcion.precio"
                        (input)="calcularTotal()" required>

                    <div class="invalid-feedback">
                        Ingrese el precio.
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        Categoría del alumno
                    </label>
                    <select class="form-select" name="categoriaAlumno" [(ngModel)]="inscripcion.categoriaAlumno"
                        (change)="calcularTotal()" required>
                        <option value="" selected disabled>
                            Seleccione una opción
                        </option>
                        <option value="1">
                            Estudiante
                        </option>
                        <option value="2">
                            Egresado
                        </option>
                        <option value="3">
                            Particular
                        </option>
                    </select>
                    <div class="invalid-feedback">
                        Seleccione una categoría.
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        Fecha inscripción
                    </label>
                    <input type="date" class="form-control" name="fechaInscripcion"
                        [(ngModel)]="inscripcion.fechaInscripcion" required>
                    <div class="invalid-feedback">
                        Seleccione una fecha.
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">
                        Email
                    </label>
                    <input type="email" class="form-control" name="email" [(ngModel)]="inscripcion.email" required>
                    <div class="invalid-feedback">
                        Ingrese un email válido.
                    </div>
                </div>
                <div *ngIf="inscripcion.precio && inscripcion.categoriaAlumno" class="col-12">
                    <div class="alert alert-success text-center">
                        Total a pagar:
                        $ {{ total }}
                    </div>
                </div>
                <div class="col-12">
                    <button class="btn btn-outline-light w-100" type="submit">
                        Registrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
